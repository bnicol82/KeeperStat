name: Migrate Production Database

# Manual fallback only. Production migrations run automatically inside
# Vercel's build (see vercel.json's buildCommand), using the DATABASE_URL
# the Neon integration injects there — no separately-maintained secret in
# the critical path. This workflow exists for the rare case of needing to
# migrate without deploying, and requires the PRODUCTION_DATABASE_URL
# repository secret (Settings > Secrets and variables > Actions).
on:
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Fails loudly and legibly when the secret is missing or malformed,
      # instead of surfacing later as a cryptic DNS error from pg (a
      # corrupted paste of this secret once produced `getaddrinfo EAI_AGAIN
      # base`, which took real effort to trace back here). Prints only safe
      # diagnostics: length and parsed hostname — never credentials.
      - name: Validate PRODUCTION_DATABASE_URL secret
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::PRODUCTION_DATABASE_URL secret is not set. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          node -e '
            const url = process.env.DATABASE_URL;
            if (!/^postgres(ql)?:\/\//.test(url)) {
              console.error(`::error::PRODUCTION_DATABASE_URL does not start with postgres:// or postgresql:// (length ${url.length}). Re-copy the full connection string from Vercel or Neon.`);
              process.exit(1);
            }
            try {
              const parsed = new URL(url);
              console.log(`Secret looks like a connection string (length ${url.length}, host ${parsed.hostname}).`);
            } catch {
              console.error(`::error::PRODUCTION_DATABASE_URL is not a parseable URL (length ${url.length}). Re-copy the full connection string from Vercel or Neon.`);
              process.exit(1);
            }
          '

      - name: Run migrations against production
        run: npm run db:migrate
        env:
          # pooled connection; do not log this value, it contains DB credentials
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
