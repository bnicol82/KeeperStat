name: Migrate Production Database

on:
  push:
    branches: [main]
    paths:
      - "db/migrations/**"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # PR preview branches get migrated automatically (neon-preview.yml), but
      # nothing did the same for production — a merged migration could sit
      # unapplied indefinitely with no signal that anything was wrong. This
      # closes that gap, but only once PRODUCTION_DATABASE_URL is added under
      # Settings > Secrets and variables > Actions; until then it skips with
      # a visible warning instead of failing on every migration-touching push.
      - name: Check for PRODUCTION_DATABASE_URL secret
        id: check_secret
        run: |
          if [ -z "${{ secrets.PRODUCTION_DATABASE_URL }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run migrations against production
        if: steps.check_secret.outputs.skip == 'false'
        run: npm run db:migrate
        env:
          # pooled connection; do not log this value, it contains DB credentials
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Migration skipped — secret not configured
        if: steps.check_secret.outputs.skip == 'true'
        run: echo "::warning::PRODUCTION_DATABASE_URL secret not set — skipped automatic production migration for this push. Add it under Settings > Secrets and variables > Actions to enable this."
